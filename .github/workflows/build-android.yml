name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'user-app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: user-app/package-lock.json

      - name: Check Node version
        run: node --version

      - name: Install dependencies
        run: npm ci
        working-directory: user-app

      - name: Build web app for Capacitor
        run: npx --yes vite build
        working-directory: user-app
        env:
          VITE_BASE: './'
          VITE_API_BASE: 'https://shabakat-backend.onrender.com'

      - name: Sync Capacitor
        run: npx --yes cap copy android
        working-directory: user-app

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
        working-directory: user-app/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shabakat-apk-debug
          path: user-app/android/app/build/outputs/apk/debug/app-debug.apk

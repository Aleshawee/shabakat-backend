# ============================================================
# Shabakat Rewards — Nginx configuration
# Place in /etc/nginx/sites-available/shabakat
# Then: ln -s /etc/nginx/sites-available/shabakat /etc/nginx/sites-enabled/
# ============================================================

# ---------- User-app (subdomains) ----------
server {
    listen 80;
    listen [::]:80;
    server_name *.shabakat.site;

    root /var/www/shabakat/user-app/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests -> Laravel backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Admin panel (root domain) ----------
server {
    listen 80;
    listen [::]:80;
    server_name shabakat.site;

    root /var/www/shabakat/admin-panel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------- Laravel backend (optional dedicated subdomain) ----------
server {
    listen 80;
    listen [::]:80;
    server_name api.shabakat.site;

    root /var/www/shabakat/backend/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
